version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: reacherdb
      POSTGRES_USER: reacher
      POSTGRES_PASSWORD: reacher123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reacher"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://reacher:reacher123@postgres:5432/reacherdb
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/backend_config.toml:/app/backend_config.toml:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8080

volumes:
  postgres_data:
